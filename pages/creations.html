<html lang="en">
<head>

<link rel="stylesheet" href="assets/eshu-styles.css">
<link rel="stylesheet" href="assets/styles/design-tokens.css">
<link rel="stylesheet" href="assets/styles/nav.css">
<link rel="stylesheet" href="assets/styles/layout-shared.css">
<link rel="stylesheet" href="assets/styles/creations-page.css">
</head>
<body>

<div class="top-nav">
  <div class="nav-left">
    <a href="home.html" class="nav-home" title="Home"><svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-5h2v5h6v-8h3L12 3z"/></svg></a>
    <a href="games.html" class="nav-link">Your Games</a>
    <a href="groups.html" class="nav-link">Your Groups</a>
  </div>
  <div class="nav-center">
    <a href="games.html?action=play" class="action-btn play-btn" title="Play Game"><span class="btn-label">PLAY<br>GAME</span></a>
    <a href="creations.html" class="action-btn upload-btn" title="Upload Creation"><span class="btn-label">UPLOAD<br>CREATION</span></a>
    <a href="games.html?action=create" class="action-btn create-game-btn" title="Create Game"><span class="btn-label">CREATE<br>GAME</span></a>
    <a href="groups.html?action=create" class="action-btn create-group-btn" title="Create Group"><span class="btn-label">CREATE<br>GROUP</span></a>
    <div class="xp-display" id="xpCounter">0 XP</div>
  </div>
  <div class="nav-right">
    <div class="messages-wrapper">
      <button class="header-icon-btn" id="messagesBtn" title="Messages"><svg viewBox="0 0 24 24"><path d="M2 4h20v16H2V4zm2 2v1l8 5 8-5V6H4zm0 3.5V18h16V9.5l-8 5-8-5z"/></svg></button>
      <div class="messages-dropdown" id="messagesDropdown">
        <div class="messages-dropdown-header">Messages</div>
        <div class="messages-dropdown-content">
          <div class="message-item">No new messages</div>
        </div>
      </div>
    </div>
    <button class="header-icon-btn settings-btn" id="settingsBtn" title="Settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.63-.94l-.36-2.54A.48.48 0 0013.92 2h-3.84a.48.48 0 00-.48.41l-.36 2.54a7.04 7.04 0 00-1.63.94l-2.39-.96a.49.49 0 00-.59.22L2.71 8.47a.49.49 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.05.7 1.63.94l.36 2.54a.48.48 0 00.48.41h3.84a.48.48 0 00.48-.41l.36-2.54a7.04 7.04 0 001.63-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1115.5 12 3.5 3.5 0 0112 15.5z"/></svg></button>
    <button class="header-icon-btn follow-btn" id="followedBtn" title="Followed"><svg viewBox="0 0 24 24"><polygon points="1,6 9,1 9,4 23,4 23,8 9,8 9,11"/><polygon points="23,18 15,13 15,16 1,16 1,20 15,20 15,23"/></svg></button>
    <span class="profile-name-display" id="profileNameNav">Player</span>
    <button class="profile-btn-nav" id="profileBtn" title="Profile"></button>
  </div>
</div>

<div class="page-container" id="pageContainer">
  <!-- Left Panel: Image Studio -->
  <div class="left-panel" id="leftPanel">
    <div class="studio-shell">
      <div class="image-panel-header">
        <button class="back-btn" id="backBtn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <div class="image-panel-title">Image Studio</div>
        <button class="cu-upload-trigger" id="uploadTriggerBtn" title="Choose image">Choose Image</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
      </div>

      <div class="cu-preview-wrap" id="cuPreviewWrap">
        <div class="cu-preview-stage" id="cuPreviewStage">
          <canvas class="cu-preview-canvas" id="cuPreviewCanvas"></canvas>
          <div class="cu-preview-empty" id="cuPreviewEmpty">
            <div class="cu-preview-empty-icon">📷</div>
            <div class="cu-preview-empty-text">Choose an image to get started</div>
            <div class="cu-preview-empty-hint">PNG · JPG · GIF · up to 10MB</div>
          </div>
          <div class="cu-card-preview hidden" id="cuCardPreview">
            <div class="cu-card-preview-label">Card view</div>
            <canvas class="cu-card-preview-canvas" id="cuCardPreviewCanvas" width="80" height="80"></canvas>
          </div>
        </div>
      </div>

      <div class="cu-tools" id="cuTools">
        <div class="cu-tool-section" id="cuSectionCrop">
          <button class="cu-tool-header open" data-target="cuPanelCrop">
            <span class="cu-tool-header-label">Transform</span>
            <span class="cu-tool-header-arrow">▾</span>
          </button>
          <div class="cu-tool-panel open" id="cuPanelCrop">
            <div class="cu-subgroup-title">Transform</div>
            <div class="cu-row">
              <label class="cu-label">Frame Size</label>
              <input type="range" class="cu-slider" id="cuFrameScale" min="10" max="200" value="100">
              <span class="cu-value" id="cuFrameScaleVal">100%</span>
            </div>
          </div>
        </div>

        <div class="cu-tool-section" id="cuSectionBorder">
          <button class="cu-tool-header" data-target="cuPanelBorder">
            <span class="cu-tool-header-label">Border</span>
            <span class="cu-tool-header-arrow">▾</span>
          </button>
          <div class="cu-tool-panel" id="cuPanelBorder">
            <div class="cu-row">
              <label class="cu-label">Enable</label>
              <label class="cu-toggle"><input type="checkbox" id="cuBorderEnabled"><span class="cu-toggle-track"></span></label>
            </div>
            <div class="cu-border-controls" id="cuBorderControls">
              <div class="cu-row">
                <label class="cu-label">Thickness</label>
                <input type="range" class="cu-slider" id="cuBorderWidth" min="1" max="60" value="8">
                <span class="cu-value" id="cuBorderWidthVal">8px</span>
              </div>
              <div class="cu-row">
                <label class="cu-label">Radius</label>
                <input type="range" class="cu-slider" id="cuBorderRadius" min="0" max="50" value="0">
                <span class="cu-value" id="cuBorderRadiusVal">0px</span>
              </div>
              <div class="cu-row cu-row-col">
                <label class="cu-label">Color</label>
                <div class="cu-palette-row">
                  <div class="cu-swatch-row" id="cuBorderSwatches"></div>
                  <div class="cu-color-custom-row">
                    <input type="color" class="cu-color-input" id="cuBorderColorPicker" value="#111111">
                    <span class="cu-color-hex" id="cuBorderColorHex">#111111</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="cu-tool-section" id="cuSectionBg">
          <button class="cu-tool-header" data-target="cuPanelBg">
            <span class="cu-tool-header-label">Background</span>
            <span class="cu-tool-header-arrow">▾</span>
          </button>
          <div class="cu-tool-panel" id="cuPanelBg">
            <div class="cu-row cu-row-col">
              <label class="cu-label">Color</label>
              <div class="cu-palette-row">
                <div class="cu-swatch-row" id="cuBgSwatches"></div>
                <div class="cu-color-custom-row">
                  <input type="color" class="cu-color-input" id="cuBgColorPicker" value="#ffffff">
                  <span class="cu-color-hex" id="cuBgColorHex">#ffffff</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="upload-footer" id="uploadFooter">
        <div class="upload-lock-hint" id="uploadLockHint" hidden></div>
      </div>
    </div>
  </div>

  <!-- Right Panel: Details Form -->
  <div class="right-panel" id="rightPanel">
    <div class="creation-edit-panel">
      <div class="edit-header">
        <div class="edit-title">Upload Creation</div>
      </div>
      <div class="edit-content">
        <form id="creationForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="creationTitle">Title</label>
            <input type="text" class="form-input" id="creationTitle" placeholder="Give your creation a title" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="creationDesc">Description</label>
            <textarea class="form-input" id="creationDesc" placeholder="Describe your creation"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Host Game</label>
            <div class="game-dropdown" id="gameDropdown">
              <div class="game-dropdown-trigger" id="gameDropdownTrigger">
                <span class="game-dropdown-value placeholder" id="gameDropdownValue">Select a game...</span>
                <span class="game-dropdown-arrow">▼</span>
              </div>
              <div class="game-dropdown-menu" id="gameDropdownMenu">
                <div class="game-dropdown-search">
                  <input type="text" id="gameSearchInput" placeholder="Search games..." />
                </div>
                <div class="game-dropdown-list" id="gameDropdownList"></div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="creationLocation">Location</label>
            <input type="text" class="form-input" id="creationLocation" placeholder="Where was this created?">
          </div>

          <div class="form-group">
            <label class="form-label" for="creationDevices">Devices Used</label>
            <input type="text" class="form-input" id="creationDevices" placeholder="e.g. PC, Android, Console">
          </div>

          <div class="form-group">
            <label class="form-label" for="creationTags">Tags</label>
            <input type="text" class="form-input" id="creationTags" placeholder="e.g. ox, house, camel">
          </div>

          <div class="form-group">
            <label class="form-label" for="creationDate">Date Made</label>
            <input type="date" class="form-input" id="creationDate">
          </div>

          <div class="form-group">
            <label class="form-label">Privacy</label>
            <div class="toggle-options">
              <label class="toggle-option">
                <input type="radio" name="privacy" value="public" checked>
                <span>Public</span>
              </label>
              <label class="toggle-option">
                <input type="radio" name="privacy" value="private">
                <span>Private</span>
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="edit-footer" id="formFooter">
        <button type="button" class="cancel-btn" id="backToStudioBtn">Cancel</button>
        <button type="button" class="save-btn" id="createBtn">Upload</button>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingMessage">Processing...</div>
  </div>
</div>

</body>
