<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>ESHU - Game Details</title>

<link rel="stylesheet" href="assets/styles/nav.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg-panel, #f5f5f5); }

.top-nav { z-index: 20; }

.page-container {
  display: flex;
  height: calc(100vh - 56px);
  margin-top: 56px;
  background: #000;
  gap: 8px;
  padding: 8px;
}

.left-panel,
.right-panel {
  width: 50%;
  background: var(--bg-card, #fff);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--border-color, #e0e0e0);
}

.left-panel-header,
.right-panel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color, #d4d4d4);
}

.back-btn {
  width: 40px;
  height: 40px;
  min-width: 40px;
  min-height: 40px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: var(--radius-xl, 8px);
  background: #050607;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0;
  padding: 0;
  margin: 0;
  transition: background 0.15s, border-color 0.15s;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
}
.back-btn:hover {
  background: #0d1013;
  border-color: rgba(255, 255, 255, 0.28);
}
.back-btn:focus { outline: none; }
.back-btn svg {
  width: 18px;
  height: 18px;
  fill: #fff;
}

.panel-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary, #111);
}

.image-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.image-frame {
  width: min(100%, 420px);
  aspect-ratio: 1;
  height: auto;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}
.image-frame .diamond-image-frame,
.image-frame .game-placeholder-logo {
  width: 100%;
  height: 100%;
}
.image-frame .game-placeholder-logo {
  object-fit: contain;
  filter: none;
  opacity: 1;
}

.image-placeholder {
  text-align: center;
  color: var(--text-secondary, #666);
  font-size: 13px;
  padding: 16px;
}

.eshu-logo-large {
  width: 120px;
  height: 120px;
  background: #333;
  clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
}

.details-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.details-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.detail-item {
  border: 1px solid var(--border-color, #d4d4d4);
  padding: 12px;
  background: var(--bg-card, #fff);
}

.detail-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary, #666);
  text-transform: uppercase;
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

.detail-value {
  font-size: 13px;
  color: var(--text-primary, #111);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Timing boxes row */
.timing-row {
  display: flex;
  gap: 10px;
}
.timing-item {
  flex: 1;
  padding: 12px;
  text-align: center;
  color: #fff;
}
.timing-item.green { background: #2e7d32; }
.timing-item.yellow { background: #eab308; }
.timing-item.red { background: #e53935; }
.timing-item-label { font-size: 10px; text-transform: uppercase; opacity: 0.9; }
.timing-item-value { font-size: 13px; font-weight: 700; margin-top: 4px; }

/* Play button at bottom of right panel */
.details-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border-color, #e0e0e0);
}
.play-btn-full {
  width: 100%;
  padding: 14px;
  background: #00e676;
  color: #111;
  border: none;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.play-btn-full:hover { background: #00c853; }

@media (max-width: 900px) {
  .page-container {
    flex-direction: column;
    height: calc(100vh - 56px);
  }
  .left-panel,
  .right-panel {
    width: 100%;
    min-height: 0;
  }
  .left-panel { height: 40%; }
  .right-panel { height: 60%; }
}
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-left">
    <a href="home.html" class="nav-home" title="Home"><svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-5h2v5h6v-8h3L12 3z"/></svg></a>
    <a href="games.html" class="nav-link">Your Games</a>
    <a href="groups.html" class="nav-link">Your Groups</a>
  </div>
  <div class="nav-center">
    <a href="games.html?action=play" class="action-btn play-btn" title="Play Game"><span class="btn-label">PLAY<br>GAME</span></a>
    <a href="creations.html" class="action-btn upload-btn" title="Upload Creation"><span class="btn-label">UPLOAD<br>CREATION</span></a>
    <a href="games.html?action=create" class="action-btn create-game-btn" title="Create Game"><span class="btn-label">CREATE<br>GAME</span></a>
    <a href="groups.html?action=create" class="action-btn create-group-btn" title="Create Group"><span class="btn-label">CREATE<br>GROUP</span></a>
    <div class="xp-display" id="xpCounter">0 XP</div>
  </div>
  <div class="nav-right">
    <div class="messages-wrapper">
      <button class="header-icon-btn" id="messagesBtn" title="Messages"><svg viewBox="0 0 24 24"><path d="M2 4h20v16H2V4zm2 2v1l8 5 8-5V6H4zm0 3.5V18h16V9.5l-8 5-8-5z"/></svg></button>
      <div class="messages-dropdown" id="messagesDropdown">
        <div class="messages-dropdown-header">Messages</div>
        <div class="messages-dropdown-content">
          <div class="message-item">No new messages</div>
        </div>
      </div>
    </div>
    <button class="header-icon-btn settings-btn" id="settingsBtn" title="Settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.63-.94l-.36-2.54A.48.48 0 0013.92 2h-3.84a.48.48 0 00-.48.41l-.36 2.54a7.04 7.04 0 00-1.63.94l-2.39-.96a.49.49 0 00-.59.22L2.71 8.47a.49.49 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.05.7 1.63.94l.36 2.54a.48.48 0 00.48.41h3.84a.48.48 0 00.48-.41l.36-2.54a7.04 7.04 0 001.63-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1115.5 12 3.5 3.5 0 0112 15.5z"/></svg></button>
    <button class="header-icon-btn follow-btn" id="followedBtn" title="Followed"><svg viewBox="0 0 24 24"><polygon points="1,6 9,1 9,4 23,4 23,8 9,8 9,11"/><polygon points="23,18 15,13 15,16 1,16 1,20 15,20 15,23"/></svg></button>
    <span class="profile-name-display" id="profileNameNav">Player</span>
    <button class="profile-btn-nav" id="profileBtn" title="Profile"></button>
  </div>
</div>

<div class="page-container">
  <div class="left-panel">
    <div class="left-panel-header">
      <button class="back-btn" id="backBtn" type="button"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
      <span class="panel-title">Game Image</span>
    </div>
    <div class="image-area">
      <div class="image-frame" id="gameImageFrame"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="right-panel-header">
      <span class="panel-title">More About This Game</span>
    </div>
    <div class="details-body">
      <div class="details-grid" id="detailsGrid"></div>
    </div>
    <div class="details-footer">
      <button type="button" class="play-btn-full" id="playBtn">PLAY</button>
    </div>
  </div>
</div>
