<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="eshu-api-base" content="/api">
<title>ESHUGAMES</title>
<link rel="icon" href="data:,">
<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    transition: background-color 5.2s ease-in-out;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Play Button Wrapper with Ring */
  .play-ring-wrapper {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .play-ring-wrapper svg.play-ring {
    position: absolute;
    top: 0; left: 0;
    width: 180px; height: 180px;
    transform: rotate(-90deg);
  }
  .play-ring-wrapper .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.15);
    stroke-width: 6;
  }
  .play-ring-wrapper .ring-fill {
    fill: none;
    stroke: #111111;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear;
  }
  .center-button {
    appearance: none;
    -webkit-appearance: none;
    width: 150px;
    height: 150px;
    border-radius: 9999px;
    background-color: black;
    color: white;
    font-size: 22px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    cursor: pointer;
    transition: background-color 0.3s, color 0.3s;
    user-select: none;
    z-index: 1;
  }
  .center-button:hover,
  .center-button:focus {
    background-color: white;
    color: black;
    outline: none;
  }
  /* Focus visible for accessibility */
  .center-button:focus-visible {
    outline: 3px solid #66c0ff;
  }
  .eshu-auth-chip {
    top: 12px;
    right: 12px;
    bottom: auto;
  }
</style>
</head>
<body>

<div class="play-ring-wrapper" id="playRingWrapper">
  <svg class="play-ring" viewBox="0 0 180 180">
    <circle class="ring-bg" cx="90" cy="90" r="85"/>
    <circle class="ring-fill" id="ringFill" cx="90" cy="90" r="85"/>
  </svg>
  <a href="home.html" class="center-button" id="playButton" aria-label="Play game">PLAY</a>
</div>

<script src="assets/core/api.js"></script>
<script src="assets/eshu-db.js"></script>
<script src="assets/core/remote-storage-driver.js"></script>
<script src="/vendor/supabase.js"></script>
<script src="/assets/core/supabase-config.js"></script>
<script src="assets/core/supabase-browser.js"></script>
<script src="assets/components/auth-overlay.js"></script>
<script src="assets/components/auth-chip.js"></script>
<script src="assets/components/toast.js"></script>

<script src="assets/pages/play.page.js"></script>

</body>
</html>
