<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Hex Logo Preview</title>
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#f5f5f5; color:#222; }
  header { padding: 16px 24px; background:#fff; border-bottom:1px solid #ddd; }
  h1 { margin:0; font-size:18px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; padding: 24px; }
  .card { background:#fff; border:1px solid #e0e0e0; border-radius: 10px; padding: 16px; text-align:center; }
  .card.dark { background:#111; color:#eee; border-color:#222; }
  .card h3 { margin:0 0 12px; font-size:13px; font-weight:600; color:inherit; opacity:.75; }
  .card img { display:block; margin:0 auto; }
  .row { display:flex; gap:16px; align-items:center; justify-content:center; }
</style>
</head>
<body>
<header><h1>hex-logo-v2.svg &mdash; size & color preview</h1></header>

<div class="grid">
  <div class="card"><h3>1024px</h3><img src="hex-logo-v2.svg" width="256" height="256"></div>
  <div class="card"><h3>128px</h3><img src="hex-logo-v2.svg" width="128" height="128"></div>
  <div class="card"><h3>64px (nav)</h3><img src="hex-logo-v2.svg" width="64" height="64"></div>
  <div class="card"><h3>32px (favicon)</h3><img src="hex-logo-v2.svg" width="32" height="32"></div>
  <div class="card dark"><h3>On dark bg (inverted needed)</h3><img src="hex-logo-v2.svg" width="128" height="128" style="filter: invert(1);"></div>
  <div class="card"><h3>Row of sizes</h3>
    <div class="row">
      <img src="hex-logo-v2.svg" width="24" height="24">
      <img src="hex-logo-v2.svg" width="48" height="48">
      <img src="hex-logo-v2.svg" width="96" height="96">
    </div>
  </div>
</div>
</body>
</html>
