<head>

<style>
html, body { height:100%; overflow:hidden; margin:0; }
.container { height:calc(100vh - 56px); margin-top:56px; }
.right-panel {
  display:flex;
  flex-direction:column;
  min-height: 0;
  overflow-y: auto;
}
.right-panel .content {
  overflow-y: auto;
  overscroll-behavior: contain;
}

/* Profile Left Panel */
.profile-left {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.profile-panel-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border-color, #e0e0e0);
}
.profile-avatar-wrapper {
  position: relative;
  width: 130px;
  height: 130px;
  cursor: pointer;
}
.profile-panel-avatar {
  position: absolute;
  inset: 10%;
  border-radius: 50%;
  overflow: hidden;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-muted, #999);
  clip-path: circle(50% at 50% 50%);
}
.profile-panel-avatar:hover { opacity: 0.85; }
.profile-panel-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 50%;
}
.profile-cap-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 2;
  color: var(--text-primary, #111);
}
.profile-panel-avatar-hint {
  font-size: 10px;
  color: var(--text-muted, #999);
  text-align: center;
}
.profile-panel-info {
  text-align: center;
}
.profile-panel-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary, #111);
  margin: 0;
}
.profile-panel-subtitle {
  font-size: 12px;
  color: var(--text-muted, #999);
  margin-top: 2px;
}

/* Profile image crop overlay */
.profile-crop-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.profile-crop-overlay.open { display: flex; }
.profile-crop-area {
  position: relative;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  overflow: hidden;
  clip-path: circle(50% at 50% 50%);
  -webkit-clip-path: circle(50% at 50% 50%);
  border: 3px solid rgba(255,255,255,0.3);
  touch-action: none;
  cursor: grab;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
}
.profile-crop-area:active { cursor: grabbing; }
.profile-crop-area img {
  position: absolute;
  transform-origin: 0 0;
  user-select: none;
  -webkit-user-select: none;
  pointer-events: none;
}
.profile-crop-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
.profile-crop-controls label {
  color: #fff;
  font-size: 12px;
}
.profile-crop-controls input[type=range] {
  width: 160px;
  accent-color: #fff;
}
.profile-crop-btns {
  display: flex;
  gap: 10px;
}
.profile-crop-btns button {
  padding: 8px 24px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.profile-crop-btns .crop-save {
  background: #fff;
  color: #111;
}
.profile-crop-btns .crop-cancel {
  background: rgba(255,255,255,0.15);
  color: #fff;
}

.profile-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.profile-form-section {
  margin-bottom: 24px;
}
.profile-form-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted, #888);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light, #eee);
}
.profile-form-group {
  margin-bottom: 14px;
}
.profile-form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-secondary, #555);
  margin-bottom: 6px;
  margin-top: 0;
}
.profile-form-group input,
.profile-form-group textarea {
  width: 100%;
  box-sizing: border-box;
}
.profile-form-group textarea {
  resize: vertical;
  min-height: 80px;
}

/* Image actions row */
.profile-image-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.profile-image-actions button {
  font-size: 11px;
  min-height: 30px;
  padding: 0 12px;
}

/* Bottom action buttons */
.profile-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 20px;
  border-top: 1px solid var(--border-color, #e0e0e0);
  background: var(--bg-surface, #f7f7f7);
}
.profile-actions button {
  flex: 1 1 0;
  min-height: 38px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
#saveProfileBtn {
  background: var(--accent-black, #111);
  color: #fff;
  border-color: transparent;
}
#saveProfileBtn:hover { background: #333; }
#burnBtn {
  background: #111;
  color: #fff;
  border-color: transparent;
}
#burnBtn:hover { background: #333; }
#deleteProfileBtn {
  background: var(--accent-coral-dark, #c62828);
  color: #fff;
  border-color: transparent;
}
#deleteProfileBtn:hover {
  background: #b71c1c;
}

/* === Dark Theme Overrides === */
html[data-theme="dark"] .profile-panel-header {
  border-bottom-color: var(--border-color);
}
html[data-theme="dark"] .profile-panel-avatar {
  background: #222;
  color: var(--text-muted);
}
html[data-theme="dark"] .profile-cap-svg {
  color: #eeeeee;
}
html[data-theme="dark"] .profile-panel-avatar-hint {
  color: var(--text-muted);
}
html[data-theme="dark"] .profile-panel-title {
  color: var(--text-primary);
}
html[data-theme="dark"] .profile-panel-subtitle {
  color: var(--text-muted);
}
html[data-theme="dark"] .profile-panel-body {
  background: var(--bg-panel);
}
html[data-theme="dark"] .profile-form-section-title {
  color: var(--text-muted);
  border-bottom-color: var(--border-light);
}
html[data-theme="dark"] .profile-form-group label {
  color: var(--text-secondary);
}
html[data-theme="dark"] .profile-form-group input,
html[data-theme="dark"] .profile-form-group textarea {
  background: var(--bg-input);
  color: var(--text-primary);
  border-color: var(--border-color);
}
html[data-theme="dark"] .profile-form-group input::placeholder,
html[data-theme="dark"] .profile-form-group textarea::placeholder {
  color: var(--text-tertiary);
}
html[data-theme="dark"] .profile-actions {
  border-top-color: var(--border-color);
  background: var(--bg-surface);
}
html[data-theme="dark"] #saveProfileBtn {
  background: #eeeeee;
  color: #111;
}
html[data-theme="dark"] #saveProfileBtn:hover {
  background: #ffffff;
}
html[data-theme="dark"] #burnBtn {
  background: #333;
  color: #eee;
}
html[data-theme="dark"] #burnBtn:hover {
  background: #444;
}
html[data-theme="dark"] #deleteProfileBtn {
  background: var(--accent-coral-dark, #c62828);
  color: #fff;
}
html[data-theme="dark"] #deleteProfileBtn:hover {
  background: #e53935;
}
html[data-theme="dark"] .profile-image-actions button {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-color);
}
html[data-theme="dark"] .profile-image-actions button:hover {
  background: var(--bg-hover);
}
html[data-theme="dark"] .collapsible {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-color);
}
html[data-theme="dark"] .collapsible:hover {
  background: var(--bg-hover);
}
html[data-theme="dark"] .right-panel h2 {
  color: var(--text-primary);
}
html[data-theme="dark"] .right-panel .content {
  background: var(--bg-surface);
  color: var(--text-primary);
}
</style>
</head>

<div class="container">
  <div class="left-panel">
    <div class="profile-left">
      <div class="profile-panel-header">
        <div class="profile-avatar-wrapper" id="profileImagePreview" title="Click to upload">
          <div class="profile-panel-avatar" id="profileAvatarCircle">No image</div>
          <svg class="profile-cap-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M 11.6,19.6 A 49,49 0 0,1 88.4,19.6" fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="square"/>
          </svg>
        </div>
        <div class="profile-panel-avatar-hint">Click to change photo</div>
        <div class="profile-image-actions">
          <button type="button" id="changeProfileImageBtn">Upload</button>
          <button type="button" id="removeProfileImageBtn">Remove</button>
        </div>
        <div class="profile-panel-info">
          <div class="profile-panel-title" id="profileHeaderName">Profile</div>
          <div class="profile-panel-subtitle">Edit your player identity</div>
        </div>
        <input type="file" id="profileImageInput" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
      </div>

      <!-- Crop overlay -->
      <div class="profile-crop-overlay" id="profileCropOverlay">
        <div class="profile-crop-area" id="profileCropArea">
          <img id="profileCropImg">
        </div>
        <div class="profile-crop-controls">
          <label>Zoom</label>
          <input type="range" id="profileCropZoom" min="100" max="300" value="100">
        </div>
        <div class="profile-crop-btns">
          <button class="crop-cancel" id="profileCropCancel">Cancel</button>
          <button class="crop-save" id="profileCropSave">Apply</button>
        </div>
      </div>

      <div class="profile-panel-body">
        <div class="profile-form-section">
          <div class="profile-form-section-title">Identity</div>
          <div class="profile-form-group">
            <label for="profileName">Name</label>
            <input type="text" id="profileName" placeholder="Enter your profile name" />
          </div>
          <div class="profile-form-group">
            <label for="profileDesc">About Me</label>
            <textarea id="profileDesc" rows="4" placeholder="Write something about yourself..."></textarea>
          </div>
        </div>

      </div>

      <div class="profile-actions">
        <button id="saveProfileBtn">Save Player</button>
        <button id="deleteProfileBtn">Delete</button>
        <button id="burnBtn">Boot</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
