<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESHU Arena - Creation Focus</title>

<script src="assets/core/theme-init.js"></script>
<link rel="stylesheet" href="assets/eshu-styles.css">
<link rel="stylesheet" href="assets/styles/design-tokens.css">
<link rel="stylesheet" href="assets/styles/layout-shared.css">

<style>
html, body { height:100%; margin:0; overflow:hidden; }
.container { display:flex; height:calc(100vh - 56px); margin-top:56px; width:100%; position:relative; padding:0; gap:0; overflow:hidden; }
.creation-container { 
    flex:2; display:flex; flex-direction:column; justify-content:flex-start; align-items:stretch; 
    padding:24px; box-sizing:border-box; overflow:hidden; position:relative; min-height:0;
    background:var(--bg-body); gap:12px;
}
.comment-container { flex:1; display:flex; flex-direction:column; padding:24px; box-sizing:border-box; gap:12px; overflow:hidden; background:var(--bg-body); min-width:320px; min-height:0; border-right:1px solid var(--border-color); }
.comment-toolbar { display:flex; justify-content:flex-start; align-items:center; gap:10px; }
.comment-count { font-size:12px; font-weight:600; color:var(--text-secondary); }
.comment-section {
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:var(--bg-panel);
    border:1px solid var(--border-color);
    border-radius:var(--radius-lg);
    padding:12px;
}
.comment-section::-webkit-scrollbar { width: 6px; }
.comment-section::-webkit-scrollbar-track { background: var(--bg-card); border-radius: 3px; }
.comment-section::-webkit-scrollbar-thumb { background: #999999; border-radius: 3px; }
.comment-empty { color:var(--text-secondary); text-align:center; padding:24px; }
.comment-input {
    flex-grow:1;
    padding:0 12px;
    border-radius:var(--radius-lg);
    border:1px solid var(--border-color);
    font-size:13px;
    background:var(--bg-input);
    color:var(--text-primary);
    height:34px;
    min-height:34px;
    max-height:34px;
    resize:none;
    box-sizing:border-box;
    line-height:34px;
    overflow:hidden;
    white-space:nowrap;
}
.comment-input:focus { outline:none; border-color:var(--accent-black, #111); }
.comment-button, .draw-button {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:34px;
    min-width:88px;
    padding:0 14px;
    border:none;
    font-weight:600;
    cursor:pointer;
    transition:all var(--transition-fast);
    border-radius:var(--radius-lg);
    font-size:12px;
    line-height:1;
}
.comment-button { background:var(--accent-black, #111); color:var(--text-light); }
.comment-button:hover { background:#333; }
.draw-button { background:var(--accent-coral); color:var(--text-light); }
.draw-button:hover { background:#ec971f; }
.image-box { 
    width:100%; flex-grow:1; border-radius:var(--radius-xl); transition:transform 0.4s ease; position:relative; 
    display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg-panel); box-sizing:border-box; min-height:350px; overflow:hidden; 
    box-shadow:var(--shadow-md); border:1px solid var(--border-color);
}
.icon-btn {
    position: absolute;
    width:32px;
    height:32px;
    background: var(--accent-blue);
    color:var(--text-light);
    border:none;
    border-radius:var(--radius-md);
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    transition: all var(--transition-normal);
}
.icon-btn:hover {
    transform: scale(1.1);
}
.focus-section-header-top {
    display: flex;
    align-items: center;
    gap: 12px;
}
.focus-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
}
.focus-header-action-btn {
    width: 28px;
    height: 28px;
    min-width: 28px;
    min-height: 28px;
    background: #050607;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 0;
    cursor: pointer;
    padding: 0;
    color: rgba(255,255,255,0.78);
    font-size: 14px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.1s ease;
}
.focus-header-action-btn:hover {
    background: #0d1013;
    border-color: rgba(255,255,255,0.28);
    color: #fff;
    transform: scale(1.05);
}
.focus-header-action-btn svg {
    width: 13px;
    height: 13px;
    fill: currentColor;
}
.focus-header-action-btn.active {
    background: #2e7d32;
    border-color: #2e7d32;
    color: #fff;
}
.focus-header-action-btn.active[aria-label="Follow"] {
    background: #42a5f5;
    border-color: #42a5f5;
}
.focus-close-btn {
    width: 28px;
    height: 28px;
    min-width: 28px;
    min-height: 28px;
    background: #050607;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: var(--radius-xl, 8px);
    cursor: pointer;
    padding: 0;
    font-size: 0;
    color: transparent;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.focus-close-btn::before,
.focus-close-btn::after {
    content: '';
    position: absolute;
    width: 13px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
    top: 50%;
    left: 50%;
}
.focus-close-btn::before {
    transform: translate(-50%, -50%) rotate(45deg);
}
.focus-close-btn::after {
    transform: translate(-50%, -50%) rotate(-45deg);
}
.focus-close-btn:hover {
    background: #0d1013;
    border-color: rgba(255,255,255,0.28);
}
.fullscreen-btn {
    position: absolute;
    top: var(--spacing-sm);
    right: var(--spacing-sm);
    width: 28px !important;
    height: 28px !important;
    min-width: 28px !important;
    min-height: 28px !important;
    max-width: 28px !important;
    max-height: 28px !important;
    background: #050607;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    z-index: 80;
    cursor: pointer;
    padding: 0 !important;
    outline: none;
    box-sizing: border-box;
    transition: background 0.15s ease, border-color 0.15s ease;
}
.fullscreen-btn::before {
    content: '';
    display: block;
    width: 14px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
}
.fullscreen-btn.is-exit::before {
    top: auto;
    bottom: 5px;
}
.fullscreen-btn:hover {
    background: #1a1d20;
    border-color: rgba(255,255,255,0.45);
}
.fullscreen-btn svg { display: none; }
.image-box .fullscreen-btn {
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-normal), transform var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast);
}
.image-box:hover .fullscreen-btn,
.image-box:focus-within .fullscreen-btn {
    opacity: 1;
    pointer-events: auto;
}
.image-box:fullscreen .focus-hover-overlay,
.image-box:-webkit-full-screen .focus-hover-overlay,
.image-box:fullscreen .fullscreen-btn,
.image-box:-webkit-full-screen .fullscreen-btn {
    opacity: 0;
    pointer-events: none;
}
.image-box:fullscreen.fullscreen-ui-visible .focus-hover-overlay,
.image-box:-webkit-full-screen.fullscreen-ui-visible .focus-hover-overlay,
.image-box:fullscreen.fullscreen-ui-visible .fullscreen-btn,
.image-box:-webkit-full-screen.fullscreen-ui-visible .fullscreen-btn {
    opacity: 1;
    pointer-events: auto;
}
.creation-display { font-size:16px; padding:var(--spacing-xl); text-align:center; white-space:pre-wrap; color:var(--text-primary); display:none; }
#creationImage {
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    max-width: 100%;
    max-height: calc(100% - 90px);
    object-fit: contain;
    display: none;
}
.creation-display {
    width: 100%;
    flex: 0 0 auto;
}
.creation-display.fallback-active {
    display: block;
    height: 100%;
    flex: 1 1 auto;
    text-align: left;
    overflow: auto;
    padding: 16px;
}
.creation-fallback-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    min-height: 100%;
}
.creation-fallback-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.25;
}
.creation-fallback-meta {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.35;
}
.creation-fallback-desc,
.creation-fallback-extra {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
}
.focus-hover-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    padding: var(--spacing-md);
    background: transparent;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-normal);
    z-index: 20;
}
.image-box:hover .focus-hover-overlay,
.image-box:focus-within .focus-hover-overlay {
    opacity: 1;
    /* Overlay itself stays pointer-transparent so drag-to-pan on the image
     * underneath isn't intercepted by the (mostly empty) full-bleed overlay
     * region. Only the bottom info/action panel re-enables pointer events. */
    pointer-events: none;
}
.image-box:hover .focus-hover-overlay .focus-overlay-panel,
.image-box:focus-within .focus-hover-overlay .focus-overlay-panel {
    pointer-events: auto;
}
.focus-overlay-panel {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-md);
    background: #050607;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: var(--radius-xl, 8px);
    padding: 6px 10px;
    color: #fff;
}
.focus-overlay-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1 1 auto;
    font-size: 12px;
}
.focus-overlay-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-width: 0;
}
.focus-overlay-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.5);
}
.focus-overlay-value {
    font-size: 12px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.focus-overlay-note {
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: transparent;
    color: #fff;
    font-size: 10px;
    text-align: left;
    border-radius: var(--radius-xl, 8px);
    padding: 5px 8px;
    cursor: pointer;
    flex: 0 0 auto;
}
.focus-overlay-note:hover {
    background: rgba(255, 255, 255, 0.1);
}
.focus-overlay-actions {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
}
.focus-overlay-action-btn {
    width: 30px;
    height: 30px;
    min-width: 30px;
    min-height: 30px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: var(--radius-xl, 8px);
    background: #050607;
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.focus-overlay-action-btn:hover {
    background: #0d1013;
    border-color: rgba(255, 255, 255, 0.28);
}
.focus-overlay-action-btn.liked {
    background: #2e7d32;
    border-color: #2e7d32;
    color: #fff;
}
.focus-overlay-action-btn.followed {
    background: #42a5f5;
    border-color: #42a5f5;
    color: #fff;
}
.focus-overlay-action-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
}
.focus-liked-indicator,
.focus-followed-indicator {
    position: absolute;
    top: var(--spacing-sm, 8px);
    width: 40px;
    height: 40px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: #050607;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: var(--radius-xl, 8px);
    z-index: 60;
    pointer-events: none;
}
.focus-liked-indicator {
    right: calc(var(--spacing-sm, 8px) + 48px);
    color: #2e7d32;
}
.focus-followed-indicator {
    right: calc(var(--spacing-sm, 8px) + 96px);
    color: #42a5f5;
}
.focus-liked-indicator.active,
.focus-followed-indicator.active {
    display: flex;
}
.image-box:fullscreen .focus-hover-overlay,
.image-box:-webkit-full-screen .focus-hover-overlay,
.image-box:fullscreen .fullscreen-btn,
.image-box:-webkit-full-screen .fullscreen-btn {
    opacity: 0 !important;
    pointer-events: none !important;
}
/* When UI is visible in fullscreen: show overlay but keep it pointer-transparent
 * so image panning still works. Only the panel inside should capture clicks. */
.image-box:fullscreen.fullscreen-ui-visible .focus-hover-overlay,
.image-box:-webkit-full-screen.fullscreen-ui-visible .focus-hover-overlay {
    opacity: 1 !important;
    pointer-events: none !important; /* Allow drag-to-pan on image underneath */
}
.image-box:fullscreen.fullscreen-ui-visible .focus-hover-overlay .focus-overlay-panel,
.image-box:-webkit-full-screen.fullscreen-ui-visible .focus-hover-overlay .focus-overlay-panel {
    pointer-events: auto !important; /* Only interactive panel captures clicks */
}
.image-box:fullscreen.fullscreen-ui-visible .fullscreen-btn,
.image-box:-webkit-full-screen.fullscreen-ui-visible .fullscreen-btn {
    opacity: 1 !important;
    pointer-events: auto !important;
}
@media (max-width: 980px) {
    .focus-overlay-panel {
        flex-wrap: wrap;
        gap: 8px;
    }
    .focus-overlay-meta {
        width: 100%;
        flex-wrap: wrap;
        gap: 8px;
    }
    .focus-overlay-chip {
        min-width: 0;
        flex: 1 1 30%;
    }
    .focus-overlay-note {
        order: 2;
        flex: 1 1 auto;
        min-width: 170px;
    }
    .focus-overlay-actions {
        order: 3;
        margin-left: 0;
    }
    .focus-overlay-action-btn {
        width: 28px;
        height: 28px;
        font-size: 15px;
    }
}
/* Section headers */
.focus-section-header {
    width: 100%;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
    min-height: 40px;
}
.focus-section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.25;
}
.focus-section-meta {
    display: flex;
    align-items: center;
    gap: 16px;
}
.focus-section-chip {
    font-size: 12px;
    color: var(--text-primary);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.focus-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    font-weight: 600;
}
.draw-overlay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:var(--bg-panel); z-index:50; border-radius:var(--radius-xl); }
.draw-overlay iframe { width:100%; height:100%; border:none; border-radius:var(--radius-xl); }

/* Pending animation indicator in comment input */
.focus-comment-input.has-pending-animation {
  border: 2px solid #2aa8ff !important;
  background: linear-gradient(90deg, rgba(42, 168, 255, 0.1) 0%, transparent 100%);
  box-shadow: 0 0 8px rgba(42, 168, 255, 0.3);
}

/* Award badge for winning creations */
.focus-award-badge {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 48px;
  height: 48px;
  z-index: 50;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
.focus-award-badge .award-diamond {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
</style>
</head>

      <div class="focus-header-actions">
        <button type="button" id="focusHeaderLikeBtn" class="focus-header-action-btn" title="Like" aria-label="Like"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
